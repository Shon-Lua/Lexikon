<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lexikon OS — Прошивка</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 1.5rem;
    }
    .container {
      width: 100%;
      max-width: 620px;
      background: #121212;
      border: 1px solid #333;
      border-radius: 0;
      padding: 2.5rem 2rem;
      color: #ccc;
      box-shadow: 0 0 0 1px #2a2a2a;
    }
    .header {
      margin-bottom: 2.5rem;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 1.5rem;
    }
    .logo {
      font-size: 2.3rem;
      font-weight: 700;
      letter-spacing: 0.4rem;
      color: #ffffff;
      text-transform: uppercase;
      line-height: 1.1;
    }
    .subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.25rem;
      color: #666;
      margin-top: 0.3rem;
      text-transform: uppercase;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 2rem;
      padding: 1rem 1.2rem;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
    }
    .connection-indicator {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #2a2a2a;
      border: 1px solid #555;
      transition: background 0.2s;
    }
    .dot.active {
      background: #ffffff;
      border-color: #ffffff;
    }
    .device-label {
      font-size: 0.9rem;
      color: #aaa;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .connect-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid #444;
      color: #ccc;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08rem;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .connect-btn:hover {
      border-color: #fff;
      color: #fff;
      background: #222;
    }
    .connect-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .icon {
      font-size: 1rem;
      line-height: 1;
      display: inline-block;
    }
    .flash-section {
      margin: 2rem 0 1.8rem;
    }
    .flash-btn {
      width: 100%;
      background: #fff;
      color: #000;
      border: 2px solid #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15rem;
      text-transform: uppercase;
      padding: 1rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }
    .flash-btn:hover:not(:disabled) {
      background: #000;
      color: #fff;
      border-color: #fff;
    }
    .flash-btn:disabled {
      background: #333;
      border-color: #444;
      color: #777;
      cursor: not-allowed;
    }
    .progress-wrap {
      margin: 1.8rem 0 1.5rem;
    }
    .progress-bg {
      height: 6px;
      background: #1e1e1e;
      width: 100%;
      border: 1px solid #333;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #ffffff;
      transition: width 0.08s linear;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #666;
      margin-top: 0.5rem;
      letter-spacing: 0.5px;
    }
    .log-area {
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      padding: 1rem;
      height: 150px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: #aaa;
      line-height: 1.6;
      margin-top: 1.5rem;
    }
    .log-entry {
      border-bottom: 1px solid #1a1a1a;
      padding: 0.2rem 0;
    }
    .log-entry.highlight {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">LEXIKON</div>
      <div class="subtitle">Flash Utility · monochrome edition</div>
    </div>

    <div class="status-row">
      <div class="connection-indicator">
        <span class="dot" id="statusDot"></span>
        <span class="device-label" id="statusText">Нет подключения</span>
      </div>
      <button class="connect-btn" id="connectBtn">
        <span class="icon">&#x23FB;</span> Подключить
      </button>
    </div>

    <div class="flash-section">
      <button class="flash-btn" id="flashBtn" disabled>
        <span class="icon">&#x21E8;</span> Записать прошивку
      </button>
    </div>

    <div class="progress-wrap">
      <div class="progress-bg">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-info">
        <span id="progressPercent">0%</span>
        <span id="progressLabel">ожидание</span>
      </div>
    </div>

    <div class="log-area" id="logContainer">
      <div class="log-entry">[Lexikon] Ожидание подключения устройства.</div>
    </div>
  </div>

  <script>
    const connectBtn = document.getElementById('connectBtn');
    const flashBtn = document.getElementById('flashBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');
    const progressLabel = document.getElementById('progressLabel');
    const logContainer = document.getElementById('logContainer');

    let port = null;
    let writer = null;
    let isFlashing = false;

    function log(message, highlight = false) {
      const entry = document.createElement('div');
      entry.className = 'log-entry' + (highlight ? ' highlight' : '');
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      entry.textContent = `[${time}] ${message}`;
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
      if (logContainer.children.length > 12) {
        logContainer.removeChild(logContainer.children[0]);
      }
    }

    function updateUI() {
      const connected = port !== null;
      statusDot.classList.toggle('active', connected);
      statusText.textContent = connected ? 'Устройство подключено' : 'Нет подключения';
      connectBtn.disabled = isFlashing;
      flashBtn.disabled = !connected || isFlashing;
    }

    async function connectDevice() {
      if (isFlashing) return;
      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        log('Порт открыт (115200 бод).', true);
        updateUI();
      } catch (err) {
        log('Ошибка подключения: ' + err.message);
        port = null;
        updateUI();
      }
    }

    async function fetchFirmware() {
      try {
        const response = await fetch('/firmware.bin');
        if (!response.ok) throw new Error('Файл прошивки не найден (HTTP ' + response.status + ')');
        const buffer = await response.arrayBuffer();
        log(`Прошивка загружена, размер: ${buffer.byteLength} байт.`);
        return new Uint8Array(buffer);
      } catch (e) {
        log('Ошибка загрузки прошивки: ' + e.message);
        throw e;
      }
    }

    async function startFlash() {
      if (!port || isFlashing) return;
      isFlashing = true;
      updateUI();
      progressFill.style.width = '0%';
      progressPercent.textContent = '0%';
      progressLabel.textContent = 'подготовка';
      log('Начало записи прошивки...', true);
      try {
        const firmwareData = await fetchFirmware();
        const chunkSize = 1024;
        let offset = 0;
        const total = firmwareData.length;
        writer = port.writable.getWriter();
        while (offset < total) {
          const end = Math.min(offset + chunkSize, total);
          const chunk = firmwareData.slice(offset, end);
          await writer.write(chunk);
          offset = end;
          const percent = Math.round((offset / total) * 100);
          progressFill.style.width = percent + '%';
          progressPercent.textContent = percent + '%';
          progressLabel.textContent = `передача ${offset}/${total}`;
        }
        await writer.close();
        writer = null;
        progressLabel.textContent = 'завершено';
        log('Прошивка успешно записана.', true);
      } catch (err) {
        log('Ошибка прошивки: ' + err.message);
        if (writer) {
          await writer.close().catch(() => {});
          writer = null;
        }
        progressLabel.textContent = 'ошибка';
      } finally {
        isFlashing = false;
        updateUI();
      }
    }

    connectBtn.addEventListener('click', connectDevice);
    flashBtn.addEventListener('click', startFlash);

    if (!('serial' in navigator)) {
      log('Web Serial API не поддерживается в этом браузере.');
      connectBtn.disabled = true;
      flashBtn.disabled = true;
      statusText.textContent = 'API недоступен';
    }

    updateUI();
  </script>
</body>
</html>
